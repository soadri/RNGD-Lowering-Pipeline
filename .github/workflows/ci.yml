name: RNGD Lowering CI

on:
  push:
    branches: [main]
    paths:
      - 'e2e_pipeline.py'
      - 'init_registry.py'
      - 'registry.py'
      - 'ci_analyze.py'
      - 'build_pages.py'
      - 'models/**'
      - '.github/workflows/ci.yml'
  pull_request:
    paths:
      - 'e2e_pipeline.py'
      - 'init_registry.py'
      - 'registry.py'
      - 'ci_analyze.py'
      - 'models/**'
  workflow_dispatch:

env:
  VENV: /home/ubuntu/rngd-mlir-pipeline/.venv
  PIPELINE_DIR: /home/ubuntu/rngd-mlir-pipeline
  KERNEL_DIR: /home/ubuntu/rngd-tcp-kernel-dev
  DB_PATH: ${{ github.workspace }}/rngd_registry.db

jobs:
  # ── Job 1: 레지스트리 검증 ──────────────────────────────────────
  validate-registry:
    name: 변환 규칙 레지스트리 검증
    runs-on: [self-hosted, k-cloud]
    steps:
      - uses: actions/checkout@v4

      - name: DB 초기화
        run: |
          ${{ env.VENV }}/bin/python ${{ env.PIPELINE_DIR }}/init_registry.py \
            --reset --db ${{ env.DB_PATH }}

      - name: 레지스트리 무결성 검증
        run: |
          ${{ env.VENV }}/bin/python - <<'PYEOF'
          import sqlite3, sys, os
          db = os.environ["DB_PATH"]
          con = sqlite3.connect(db)
          con.row_factory = sqlite3.Row
          ops = con.execute("SELECT op_name FROM ops WHERE status='done'").fetchall()
          for row in ops:
              cnt = con.execute(
                  "SELECT COUNT(*) FROM evidence WHERE op_name=?", (row["op_name"],)
              ).fetchone()[0]
              if cnt == 0:
                  print(f"[FAIL] {row['op_name']}: evidence 없음", file=sys.stderr)
                  sys.exit(1)
          counts = {
              t: con.execute(f"SELECT COUNT(*) FROM {t}").fetchone()[0]
              for t in ("ops", "evidence", "hardware_constraints", "roadmap")
          }
          con.close()
          print("=== 레지스트리 검증 통과 ===")
          for k, v in counts.items():
              print(f"  {k}: {v}행")
          PYEOF

      - name: 스냅샷 저장
        run: |
          mkdir -p ci_out
          ${{ env.VENV }}/bin/python - <<'PYEOF'
          import sqlite3, json, os
          db = os.environ["DB_PATH"]
          con = sqlite3.connect(db)
          con.row_factory = sqlite3.Row
          ops = [dict(r) for r in con.execute("SELECT * FROM ops ORDER BY family, op_name")]
          con.close()
          with open("ci_out/registry_snapshot.json", "w") as f:
              json.dump(ops, f, ensure_ascii=False, indent=2)
          print(f"스냅샷: {len(ops)}개 연산")
          PYEOF

      - uses: actions/upload-artifact@v4
        with:
          name: registry-snapshot
          path: ci_out/registry_snapshot.json

  # ── Job 2: 모델 커버리지 분석 ───────────────────────────────────
  coverage-analysis:
    name: 모델 커버리지 분석
    runs-on: [self-hosted, k-cloud]
    needs: validate-registry
    strategy:
      matrix:
        model:
          - models/example_linear.py
          - models/example_rmsnorm.py
          - models/llama_rmsnorm.py
          - models/llama_ffn.py
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: DB 초기화
        run: |
          ${{ env.VENV }}/bin/python ${{ env.PIPELINE_DIR }}/init_registry.py \
            --reset --db ${{ env.DB_PATH }}

      - name: 커버리지 분석
        run: |
          MODEL="${{ matrix.model }}"
          MODEL_NAME=$(basename $MODEL .py)
          ${{ env.VENV }}/bin/python ci_analyze.py \
            --model "$MODEL" \
            --out-dir "ci_out/$MODEL_NAME" \
            --db ${{ env.DB_PATH }}

      - uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ strategy.job-index }}
          path: ci_out/

  # ── Job 3: 커널 빌드 + 정합성 검증 ─────────────────────────────
  # 모든 모델의 coverage.json을 합쳐 지원 op 합집합만 테스트
  kernel-test:
    name: 커널 정합성 검증
    runs-on: [self-hosted, k-cloud]
    needs: coverage-analysis
    steps:
      - uses: actions/checkout@v4

      - name: 커버리지 아티팩트 수집
        uses: actions/download-artifact@v4
        with:
          path: all_artifacts

      - name: 지원 op 합집합 추출
        run: |
          ${{ env.VENV }}/bin/python - <<'PYEOF'
          import json, pathlib, os

          artifacts_dir = pathlib.Path("all_artifacts")
          supported_ops = {}  # op_name → rngd_op

          for p in artifacts_dir.glob("**/coverage.json"):
              with open(p) as f:
                  cov = json.load(f)
              for op in cov["ops"]:
                  if op["supported"] and op.get("op_name"):
                      supported_ops[op["op_name"]] = op["rngd_op"]

          print(f"테스트할 연산: {list(supported_ops.keys())}")
          with open("supported_ops.json", "w") as f:
              json.dump(supported_ops, f)
          PYEOF

      - name: 커널 빌드 + 정합성 검증
        run: |
          ${{ env.VENV }}/bin/python - <<'PYEOF'
          import json, subprocess, sys
          from pathlib import Path

          with open("supported_ops.json") as f:
              supported_ops = json.load(f)

          pipeline_dir = Path("/home/ubuntu/rngd-mlir-pipeline")
          kernel_dir = Path("/home/ubuntu/rngd-tcp-kernel-dev")
          venv = Path("/home/ubuntu/rngd-mlir-pipeline/.venv/bin/python")

          results = {}
          for op_name in supported_ops:
              print(f"\n{'='*50}\n테스트: {op_name}\n{'='*50}")

              # 커널 코드 생성 + 배치
              r1 = subprocess.run(
                  [str(venv), "e2e_pipeline.py", op_name],
                  cwd=str(pipeline_dir), capture_output=True, text=True
              )
              print(r1.stdout[-500:] if r1.stdout else "")
              if r1.returncode != 0:
                  print(f"[FAIL] {op_name}: 코드 생성 실패")
                  print(r1.stderr[-300:])
                  results[op_name] = "FAIL"
                  continue

              r2 = subprocess.run(
                  [str(venv), "deploy_and_test.py", op_name, "--no-test"],
                  cwd=str(pipeline_dir), capture_output=True, text=True
              )
              if r2.returncode != 0:
                  print(f"[FAIL] {op_name}: 배치 실패")
                  results[op_name] = "FAIL"
                  continue

              # cargo furiosa-opt test
              r3 = subprocess.run(
                  ["cargo", "furiosa-opt", "test", f"pilot_e2e_{op_name}"],
                  cwd=str(kernel_dir), capture_output=True, text=True
              )
              output = r3.stdout + r3.stderr
              print(output[-500:])
              if "test result: ok" in output:
                  print(f"[PASS] {op_name}")
                  results[op_name] = "PASS"
              else:
                  print(f"[FAIL] {op_name}")
                  results[op_name] = "FAIL"

          # 결과 저장
          Path("ci_out").mkdir(exist_ok=True)
          with open("ci_out/kernel_results.json", "w") as f:
              json.dump(results, f, ensure_ascii=False, indent=2)

          print(f"\n{'='*50}\n=== 커널 테스트 요약 ===")
          passed = [op for op, r in results.items() if r == "PASS"]
          failed = [op for op, r in results.items() if r != "PASS"]
          print(f"PASS: {len(passed)}/{len(results)}")
          for op in failed:
              print(f"  FAIL: {op}")

          if failed:
              sys.exit(1)
          PYEOF

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: kernel-results
          path: ci_out/kernel_results.json

  # ── Job 4: Pages 리포트 빌드 ────────────────────────────────────
  build-report:
    name: Pages 리포트 빌드
    runs-on: [self-hosted, k-cloud]
    needs: [coverage-analysis, kernel-test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      pages: write
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: all_artifacts

      - name: commit SHA 저장
        run: echo "${{ github.sha }}" > COMMIT_SHA

      - name: HTML 리포트 빌드
        run: ${{ env.VENV }}/bin/python build_pages.py all_artifacts

      - uses: actions/upload-pages-artifact@v3
        with:
          path: pages_out

      - uses: actions/deploy-pages@v4

  # ── Job 5: PR 코멘트 ────────────────────────────────────────────
  pr-comment:
    name: PR 코멘트
    runs-on: [self-hosted, k-cloud]
    needs: [coverage-analysis, kernel-test]
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: all_artifacts

      - name: 코멘트 생성
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const artifactsDir = 'all_artifacts';

            // 커버리지 결과
            const coverages = [];
            for (const dir of fs.readdirSync(artifactsDir)) {
              const covPath = path.join(artifactsDir, dir, 'coverage.json');
              if (fs.existsSync(covPath))
                coverages.push(JSON.parse(fs.readFileSync(covPath, 'utf8')));
            }

            // 커널 테스트 결과
            let kernelResults = {};
            const krPath = path.join(artifactsDir, 'kernel-results', 'kernel_results.json');
            if (fs.existsSync(krPath))
              kernelResults = JSON.parse(fs.readFileSync(krPath, 'utf8'));

            let body = '## 🔍 RNGD Lowering CI 결과\n\n';

            // 커널 테스트 요약
            const ops = Object.keys(kernelResults);
            if (ops.length > 0) {
              const passed = ops.filter(op => kernelResults[op] === 'PASS');
              body += `### 커널 정합성 검증 (${passed.length}/${ops.length} PASS)\n\n`;
              body += '| 연산 | 결과 |\n|---|---|\n';
              for (const op of ops.sort()) {
                const icon = kernelResults[op] === 'PASS' ? '✅' : '❌';
                body += `| \`${op}\` | ${icon} ${kernelResults[op]} |\n`;
              }
              body += '\n';
            }

            // 모델별 커버리지 + 연산별 커널 검증 결과
            if (coverages.length > 0) {
              body += '### 모델별 커버리지\n\n';
              for (const cov of coverages) {
                const pct = cov.coverage_pct;
                const emoji = pct >= 80 ? '🟢' : pct >= 50 ? '🟡' : '🔴';
                const name = path.basename(cov.model, '.py');
                body += `**${name}** ${emoji} ${pct}%\n\n`;
                body += '| linalg op | RNGD op | 커널 검증 |\n|---|---|---|\n';
                for (const op of cov.ops.filter(o => o.supported)) {
                  const kr = kernelResults[op.op_name];
                  const icon = kr === 'PASS' ? '✅' : kr === 'FAIL' ? '❌' : '⏳';
                  body += `| \`${op.op}\` | \`${op.rngd_op}\` | ${icon} ${kr || '-'} |\n`;
                }
                const unsup = cov.ops.filter(o => !o.supported);
                if (unsup.length > 0) {
                  body += `\n미지원: ${unsup.map(o => `\`${o.op}\``).join(', ')}\n`;
                }
                body += '\n';
              }
            }

            const marker = '<!-- rngd-ci-coverage -->';
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number
            });
            const existing = comments.find(c => c.body.includes(marker));
            const fullBody = marker + '\n' + body;
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner, repo: context.repo.repo,
                comment_id: existing.id, body: fullBody
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: context.issue.number, body: fullBody
              });
            }
