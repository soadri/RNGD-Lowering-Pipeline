name: PyTorch Upstream м¶”м Ғ

on:
  schedule:
    - cron: '0 9 * * 1'  # л§ӨмЈј мӣ”мҡ”мқј мҳӨм „ 9мӢң KST (UTC 0мӢң)
  workflow_dispatch:       # мҲҳлҸҷ мӢӨн–ү к°ҖлҠҘ

env:
  VENV: /home/ubuntu/rngd-mlir-pipeline/.venv

jobs:
  track-upstream:
    name: PyTorch лІ„м „ м¶”м Ғ + IR нҢЁн„ҙ л№„көҗ
    runs-on: [self-hosted, k-cloud]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # м „мІҙ нһҲмҠӨнҶ лҰ¬ (snapshots нҸ¬н•Ё)

      - name: PyTorch лІ„м „ нҷ•мқё + IR мҠӨлғ…мғ· мғқм„ұ
        id: track
        run: |
          ${{ env.VENV }}/bin/python upstream_tracker.py 2>/dev/null
          echo "exit_code=$?" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: ліҖкІҪ к°җм§Җ мӢң GitHub Issue мғқм„ұ
        if: steps.track.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const versions = JSON.parse(
              fs.readFileSync('upstream_versions.json', 'utf8')
            );
            const latest = versions[versions.length - 1];
            const prev   = versions.length > 1 ? versions[versions.length - 2] : null;

            let body = `## вҡ пёҸ PyTorch лІ„м „ ліҖкІҪ к°җм§Җ\n\n`;
            if (prev && prev.pytorch !== latest.pytorch) {
              body += `| | лІ„м „ |\n|---|---|\n`;
              body += `| мқҙм „ | \`${prev.pytorch}\` |\n`;
              body += `| нҳ„мһ¬ | \`${latest.pytorch}\` |\n\n`;
            }

            if (latest.ir_changes && latest.ir_changes.length > 0) {
              body += `## IR нҢЁн„ҙ ліҖкІҪ лӘЁлҚё (${latest.ir_changes.length}к°ң)\n\n`;
              for (const c of latest.ir_changes) {
                body += `### \`${c.model}\`\n`;
                if (c.added   && c.added.length)   body += `- м¶”к°Җлҗң op: \`${c.added.join(', ')}\`\n`;
                if (c.removed && c.removed.length) body += `- м ңкұ°лҗң op: \`${c.removed.join(', ')}\`\n`;
              }
              body += `\n> \`e2e_pipeline.py\`мқҳ нҢЁн„ҙ к°җм§Җ лЎңм§Ғ мҲҳм •мқҙ н•„мҡ”н•  мҲҳ мһҲмҠөлӢҲлӢӨ.\n`;
            }

            body += `\n---\nнҷ•мқё мӢңк°Ғ: ${latest.checked_at}`;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              title: `[Upstream] PyTorch ${latest.pytorch} ліҖкІҪ к°җм§Җ`,
              body:  body,
              labels: ['upstream', 'needs-review'],
            });

      - name: мҠӨлғ…мғ· + лІ„м „ мқҙл Ҙ м»Өл°Ӣ
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add snapshots/ upstream_versions.json
          git diff --staged --quiet || \
            git commit -m "chore: update PyTorch IR snapshots $(date +%Y-%m-%d)"
          git push
