name: PyTorch Upstream 추적

on:
  schedule:
    - cron: '0 0 * * 1'  # 매주 월요일 오전 9시 KST (UTC 0시)
  workflow_dispatch:       # 수동 실행 가능

env:
  VENV: /home/ubuntu/rngd-mlir-pipeline/.venv

jobs:
  track-upstream:
    name: PyTorch 버전 추적 + IR op 패턴 비교
    runs-on: [self-hosted, k-cloud]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: PyTorch 버전 확인 + op 패턴 스냅샷 생성
        id: track
        run: |
          ${{ env.VENV }}/bin/python upstream_tracker.py 2>/dev/null
        continue-on-error: true

      - name: 변경 감지 시 GitHub Issue 생성
        if: steps.track.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const versions = JSON.parse(
              fs.readFileSync('upstream_versions.json', 'utf8')
            );
            const latest = versions[versions.length - 1];
            const prev   = versions.length > 1 ? versions[versions.length - 2] : null;

            let body = `## ⚠️ PyTorch IR 패턴 변경 감지\n\n`;

            if (prev && prev.pytorch !== latest.pytorch) {
              body += `### 버전 변경\n`;
              body += `| | 버전 |\n|---|---|\n`;
              body += `| 이전 | \`${prev.pytorch}\` |\n`;
              body += `| 현재 | \`${latest.pytorch}\` |\n\n`;
            }

            if (latest.ir_changes && latest.ir_changes.length > 0) {
              body += `### 변경된 모델 (${latest.ir_changes.length}개)\n\n`;
              for (const c of latest.ir_changes) {
                body += `**\`${c.model}\`**\n`;
                if (c.added   && c.added.length)
                  body += `- 추가된 op: \`${c.added.join(', ')}\`\n`;
                if (c.removed && c.removed.length)
                  body += `- 제거된 op: \`${c.removed.join(', ')}\`\n`;
                body += '\n';
              }
              body += `> \`e2e_pipeline.py\`의 패턴 감지 로직 수정이 필요할 수 있습니다.\n`;
            }

            body += `\n---\n확인 시각: ${latest.checked_at}`;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              title: `[Upstream] PyTorch ${latest.pytorch} IR 패턴 변경 감지`,
              body:  body,
              labels: ['upstream', 'needs-review'],
            });
            console.log('GitHub Issue 생성 완료');

      - name: 스냅샷 + 버전 이력 커밋
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add snapshots/ upstream_versions.json
          git diff --staged --quiet || \
            git commit -m "chore: update PyTorch op snapshots $(date +%Y-%m-%d)"
          git push
